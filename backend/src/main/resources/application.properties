spring.application.name=TunisiaHub_backend
springdoc.api-docs.version=openapi_3_0
### DATABASE ###
spring.datasource.url=jdbc:mysql://localhost:3306/tunisiahub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
### JPA / HIBERNATE ###
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
## JWT token
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
### CONFIGURATION SERVEUR ###
server.port=8089
ai.service.url=http://localhost:8000

### MAIL (configure with your SMTP provider) ###
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

### ACCOMMODATION REMINDER SCHEDULER ###
app.reminder.timezone=Africa/Tunis
app.reminder.accommodation.cron=0 */15 * * * *

### OPENROUTESERVICE ###
ors.api.key=${ORS_API_KEY}
### BOOKING ###
booking.fee.rate=0.10

### GEMINI ###
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=${GEMINI_MODEL:gemini-2.5-flash}

### LOGS ###
logging.level.org.example.backend_tunisiahub=DEBUG
logging.level.org.springframework.security=DEBUG

### DEVTOOLS ###
spring.devtools.restart.enabled=true
