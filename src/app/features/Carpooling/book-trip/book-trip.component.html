<div class="container py-4" *ngIf="trip; else noTrip">
  <h2 class="mb-4">Book trip</h2>

  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <h5>{{ trip.departure }} -> {{ trip.destination }}</h5>
      <p class="mb-1">
        <strong>Date:</strong> {{ trip.departureDateTime | date: "medium" }}
      </p>
      <p class="mb-1">
        <strong>Price per seat:</strong> {{ trip.pricePerSeat }} TND
      </p>
      <p class="mb-0">
        <strong>Seats available:</strong> {{ trip.seatsAvailable }}
      </p>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form
        [formGroup]="bookingForm"
        (ngSubmit)="confirmBooking()"
        class="row g-3 align-items-end"
      >
        <div class="col-md-4">
          <label class="form-label">Selected seats</label>
          <input
            type="number"
            min="1"
            class="form-control"
            formControlName="seats"
          />
        </div>
        <div class="col-md-4">
          <label class="form-label">Total price</label>
          <input class="form-control" [value]="totalPrice + ' TND'" readonly />
        </div>
        <div class="col-md-4 d-flex gap-2">
          <button type="submit" class="btn btn-success">Confirm booking</button>
          <button
            type="button"
            class="btn btn-outline-secondary"
            (click)="cancel()"
          >
            Cancel
          </button>
        </div>
      </form>

      <div class="alert alert-danger mt-3 mb-0" *ngIf="error">{{ error }}</div>
      <div class="alert alert-success mt-3 mb-0" *ngIf="success">
        {{ success }}
      </div>
    </div>
  </div>
</div>

<ng-template #noTrip>
  <div class="container py-4">
    <div class="alert alert-warning">{{ error || "Trip not found." }}</div>
  </div>
</ng-template>
