<div class="container py-4">
  <h2 class="mb-3">Passenger list</h2>

  <div class="card shadow-sm" *ngIf="passengers.length > 0; else emptyState">
    <div class="table-responsive">
      <table class="table align-middle mb-0">
        <thead>
          <tr>
            <th>Full name</th>
            <th>Email</th>
            <th>Seats booked</th>
            <th>Booking date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of passengers">
            <td>{{ item.passenger?.fullName }}</td>
            <td>{{ item.passenger?.email }}</td>
            <td>{{ item.booking.seatsBooked }}</td>
            <td>{{ item.booking.bookingDate | date: "medium" }}</td>
            <td>{{ item.booking.status }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <ng-template #emptyState>
    <div class="alert alert-info">
      No passenger data available for this trip, or you are not the owner.
    </div>
  </ng-template>
</div>
