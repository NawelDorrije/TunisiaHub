<div class="container py-4">
  <div class="row mb-4">
    <div class="col-md-8">
      <h2>Publish a trip</h2>
    </div>
    <div class="col-md-4 text-end">
      <a class="btn btn-outline-primary" routerLink="/carpooling/vehicles">
        <i class="bi bi-car-front"></i> Manage Vehicles
      </a>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form [formGroup]="publishForm" (ngSubmit)="publish()" class="row g-3">
        <!-- Trip Details Section -->
        <div class="col-12">
          <h5 class="border-bottom pb-2">Trip Details</h5>
        </div>

        <div class="col-md-6">
          <label class="form-label"
            >Departure point <span class="text-danger">*</span></label
          >
          <input class="form-control" formControlName="departure" />
        </div>
        <div class="col-md-6">
          <label class="form-label"
            >Destination <span class="text-danger">*</span></label
          >
          <input class="form-control" formControlName="destination" />
        </div>
        <div class="col-md-6">
          <label class="form-label"
            >Departure date and time <span class="text-danger">*</span></label
          >
          <input
            type="datetime-local"
            class="form-control"
            formControlName="departureDateTime"
          />
        </div>
        <div class="col-md-3">
          <label class="form-label"
            >Price per seat <span class="text-danger">*</span></label
          >
          <input
            type="number"
            min="0"
            class="form-control"
            formControlName="pricePerSeat"
          />
        </div>
        <div class="col-md-3">
          <label class="form-label"
            >Total seats <span class="text-danger">*</span></label
          >
          <input
            type="number"
            min="1"
            class="form-control"
            formControlName="seatsTotal"
          />
        </div>
        <div class="col-md-6">
          <label class="form-label">Meeting point (optional)</label>
          <input class="form-control" formControlName="meetingPoint" />
        </div>

        <!-- Vehicle Section -->
        <div class="col-12 mt-4">
          <h5 class="border-bottom pb-2">Vehicle Information</h5>
        </div>

        <!-- Vehicle Selection/Loading -->
        <div class="col-12" *ngIf="loadingVehicles">
          <div class="alert alert-info">Loading your vehicles...</div>
        </div>

        <!-- Vehicle Dropdown (if vehicles exist) -->
        <div class="col-md-6" *ngIf="!loadingVehicles && vehicles.length > 0">
          <label class="form-label">Your vehicles</label>
          <select
            class="form-select"
            [(ngModel)]="selectedVehicleId"
            [ngModelOptions]="{ standalone: true }"
          >
            <option [value]="null">-- Select a vehicle --</option>
            <option *ngFor="let vehicle of vehicles" [value]="vehicle.id">
              {{ vehicle.model }} ({{ vehicle.plateNumber }}) -
              {{ vehicle.color }}
            </option>
          </select>
        </div>

        <!-- Add New Vehicle Button -->
        <div class="col-md-6" *ngIf="!loadingVehicles">
          <button
            type="button"
            class="btn btn-outline-success w-100 mt-4"
            (click)="toggleAddVehicleForm()"
            [disabled]="creatingVehicle"
          >
            <i class="bi bi-plus-circle"></i>
            {{ showAddVehicleForm ? "Cancel" : "Add New Vehicle" }}
          </button>
        </div>

        <!-- Add Vehicle Form (collapsible) -->
        <div class="col-12" *ngIf="showAddVehicleForm && !loadingVehicles">
          <div class="card border-secondary mt-3">
            <div class="card-body">
              <h6 class="card-title mb-3">Add a New Vehicle</h6>
              <div [formGroup]="vehicleForm" class="row g-3">
                <div class="col-md-4">
                  <label class="form-label"
                    >Model <span class="text-danger">*</span></label
                  >
                  <input
                    type="text"
                    class="form-control"
                    formControlName="model"
                    placeholder="e.g., Toyota Prius"
                  />
                </div>
                <div class="col-md-4">
                  <label class="form-label"
                    >Plate Number <span class="text-danger">*</span></label
                  >
                  <input
                    type="text"
                    class="form-control text-uppercase"
                    formControlName="plateNumber"
                    placeholder="e.g., TN123ABC"
                  />
                </div>
                <div class="col-md-4">
                  <label class="form-label"
                    >Color <span class="text-danger">*</span></label
                  >
                  <input
                    type="text"
                    class="form-control"
                    formControlName="color"
                    placeholder="e.g., Blue"
                  />
                </div>
              </div>
              <div class="d-flex gap-2 mt-3">
                <button
                  type="button"
                  class="btn btn-success"
                  (click)="addVehicle()"
                  [disabled]="vehicleForm.invalid || creatingVehicle"
                >
                  <span *ngIf="!creatingVehicle">
                    <i class="bi bi-check-lg"></i> Add Vehicle
                  </span>
                  <span *ngIf="creatingVehicle">
                    <span class="spinner-border spinner-border-sm me-2"></span>
                    Adding...
                  </span>
                </button>
                <button
                  type="button"
                  class="btn btn-outline-secondary"
                  (click)="toggleAddVehicleForm()"
                  [disabled]="creatingVehicle"
                >
                  Cancel
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Error Messages -->
        <div class="col-12" *ngIf="error">
          <div class="alert alert-danger py-2 mb-0">
            <i class="bi bi-exclamation-circle"></i> {{ error }}
          </div>
        </div>

        <div class="col-12" *ngIf="success">
          <div class="alert alert-success py-2 mb-0">
            <i class="bi bi-check-circle"></i> {{ success }}
          </div>
        </div>

        <!-- Submit Buttons -->
        <div class="col-12 d-flex gap-2 mt-4">
          <button
            type="submit"
            class="btn btn-success"
            [disabled]="
              publishingTrip || publishForm.invalid || loadingVehicles
            "
          >
            <span *ngIf="!publishingTrip">
              <i class="bi bi-check-circle"></i> Publish trip
            </span>
            <span *ngIf="publishingTrip">
              <span class="spinner-border spinner-border-sm me-2"></span>
              Publishing...
            </span>
          </button>
          <a class="btn btn-outline-secondary" routerLink="/carpooling"
            >Cancel</a
          >
        </div>
      </form>
    </div>
  </div>
</div>
