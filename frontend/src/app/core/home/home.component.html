<div class="home-container container py-5">
  <h1 class="text-center mb-5">Discover Tunisia Services</h1>

  <div class="row g-4">
    <div class="col-md-4" *ngFor="let service of services">
      <div class="card h-100 service-card shadow-sm">
        <div class="card-body text-center">
          <i class="{{service.icon}} service-icon mb-3"></i>
          <h5 class="card-title">{{service.title}}</h5>
          <p class="card-text">{{service.description}}</p>
          <div class="d-flex gap-2">
            <a [routerLink]="service.link" class="btn btn-primary flex-grow-1">Explore</a>
            <a *ngIf="service.title === 'Restaurants'" [routerLink]="service.link" class="btn btn-success flex-grow-1" title="Add a new restaurant">
              <i class="bi bi-plus-circle"></i> Add
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
