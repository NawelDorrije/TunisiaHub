<div class="container py-4">
  <h2 class="mb-4">Report complaint</h2>

  <div class="card shadow-sm">
    <div class="card-body">
      <form [formGroup]="complaintForm" (ngSubmit)="submit()" class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Trip reference</label>
          <input
            type="number"
            min="1"
            class="form-control"
            formControlName="tripId"
          />
        </div>
        <div class="col-md-6">
          <label class="form-label">Booking reference (optional)</label>
          <input
            type="number"
            min="0"
            class="form-control"
            formControlName="bookingId"
          />
        </div>
        <div class="col-12">
          <label class="form-label">Complaint description</label>
          <textarea
            rows="4"
            class="form-control"
            formControlName="description"
          ></textarea>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-warning">
            Submit complaint
          </button>
        </div>
      </form>

      <div class="alert alert-success mt-3 mb-0" *ngIf="success">
        {{ success }}
      </div>
      <div class="alert alert-danger mt-3 mb-0" *ngIf="error">{{ error }}</div>
    </div>
  </div>
</div>
