<div class="container py-4">
  <div class="row mb-4">
    <div class="col-md-8">
      <h2>Manage Your Vehicles</h2>
    </div>
    <div class="col-md-4 text-end">
      <a class="btn btn-outline-secondary" routerLink="/carpooling">
        <i class="bi bi-arrow-left"></i> Back to Trips
      </a>
    </div>
  </div>

  <!-- Success Message -->
  <div
    class="alert alert-success alert-dismissible fade show"
    role="alert"
    *ngIf="successMessage"
  >
    <i class="bi bi-check-circle"></i> {{ successMessage }}
    <button
      type="button"
      class="btn-close"
      (click)="successMessage = ''"
    ></button>
  </div>

  <!-- Error Message -->
  <div
    class="alert alert-danger alert-dismissible fade show"
    role="alert"
    *ngIf="error"
  >
    <i class="bi bi-exclamation-circle"></i> {{ error }}
    <button type="button" class="btn-close" (click)="error = ''"></button>
  </div>

  <!-- Loading State -->
  <div class="alert alert-info" *ngIf="loading">
    <span class="spinner-border spinner-border-sm me-2"></span> Loading
    vehicles...
  </div>

  <!-- Add Vehicle Section -->
  <div class="card shadow-sm mb-4" *ngIf="!loading">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center">
        <h5 class="mb-0">
          <i class="bi bi-car-front"></i> {{ vehicles.length }} Vehicle(s)
        </h5>
        <button
          type="button"
          class="btn btn-outline-success"
          (click)="toggleAddForm()"
        >
          <i class="bi bi-plus-circle"></i> Add New Vehicle
        </button>
      </div>
    </div>
  </div>

  <!-- Add Vehicle Form -->
  <div class="card border-secondary mb-4" *ngIf="showAddForm && !loading">
    <div class="card-body">
      <h5 class="card-title mb-3">Add a New Vehicle</h5>
      <form [formGroup]="addVehicleForm" class="row g-3">
        <div class="col-md-4">
          <label class="form-label"
            >Model <span class="text-danger">*</span></label
          >
          <input
            type="text"
            class="form-control"
            formControlName="model"
            placeholder="e.g., Toyota Prius"
          />
        </div>
        <div class="col-md-4">
          <label class="form-label"
            >Plate Number <span class="text-danger">*</span></label
          >
          <input
            type="text"
            class="form-control text-uppercase"
            formControlName="plateNumber"
            placeholder="e.g., TN123ABC"
          />
        </div>
        <div class="col-md-4">
          <label class="form-label"
            >Color <span class="text-danger">*</span></label
          >
          <input
            type="text"
            class="form-control"
            formControlName="color"
            placeholder="e.g., Blue"
          />
        </div>
        <div class="col-12">
          <button
            type="button"
            class="btn btn-success me-2"
            (click)="addVehicle()"
            [disabled]="addVehicleForm.invalid"
          >
            <i class="bi bi-check-lg"></i> Add Vehicle
          </button>
          <button
            type="button"
            class="btn btn-outline-secondary"
            (click)="toggleAddForm()"
          >
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Vehicles List -->
  <div class="row" *ngIf="!loading && vehicles.length > 0">
    <div class="col-md-6 mb-4" *ngFor="let vehicle of vehicles">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <!-- View Mode -->
          <div *ngIf="editingVehicleId !== vehicle.id">
            <h6 class="card-title mb-3">
              <i class="bi bi-car-front"></i> {{ vehicle.model }}
            </h6>
            <div class="vehicle-details">
              <p class="mb-2">
                <strong>Plate Number:</strong>
                <span class="text-monospace bg-light px-2 py-1 rounded">{{
                  vehicle.plateNumber
                }}</span>
              </p>
              <p class="mb-3">
                <strong>Color:</strong>
                <span class="badge" [style.backgroundColor]="vehicle.color">
                  {{ vehicle.color }}
                </span>
              </p>
            </div>
            <div class="d-flex gap-2">
              <button
                type="button"
                class="btn btn-sm btn-outline-primary"
                (click)="startEdit(vehicle)"
              >
                <i class="bi bi-pencil"></i> Edit
              </button>
              <button
                type="button"
                class="btn btn-sm btn-outline-danger"
                (click)="deleteVehicle(vehicle.id)"
              >
                <i class="bi bi-trash"></i> Delete
              </button>
            </div>
          </div>

          <!-- Edit Mode -->
          <div *ngIf="editingVehicleId === vehicle.id">
            <h6 class="card-title mb-3">Edit Vehicle</h6>
            <form [formGroup]="editVehicleForm" class="g-3">
              <div class="mb-3">
                <label class="form-label"
                  >Model <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  formControlName="model"
                />
              </div>
              <div class="mb-3">
                <label class="form-label"
                  >Plate Number <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  class="form-control text-uppercase"
                  formControlName="plateNumber"
                />
              </div>
              <div class="mb-3">
                <label class="form-label"
                  >Color <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  formControlName="color"
                />
              </div>
              <div class="d-flex gap-2">
                <button
                  type="button"
                  class="btn btn-sm btn-success"
                  (click)="saveEdit(vehicle.id)"
                  [disabled]="editVehicleForm.invalid"
                >
                  <i class="bi bi-check-lg"></i> Save
                </button>
                <button
                  type="button"
                  class="btn btn-sm btn-outline-secondary"
                  (click)="cancelEdit()"
                >
                  Cancel
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div class="alert alert-info" *ngIf="!loading && vehicles.length === 0">
    <i class="bi bi-info-circle"></i> You haven't added any vehicles yet.
    <button
      type="button"
      class="btn btn-sm btn-info ms-2"
      (click)="toggleAddForm()"
    >
      Add your first vehicle
    </button>
  </div>
</div>
