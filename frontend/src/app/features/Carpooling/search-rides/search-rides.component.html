<div class="container py-4">
  <h2 class="mb-4">Search rides</h2>

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <form [formGroup]="searchForm" (ngSubmit)="search()" class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Departure</label>
          <input class="form-control" formControlName="departure" />
        </div>
        <div class="col-md-3">
          <label class="form-label">Destination</label>
          <input class="form-control" formControlName="destination" />
        </div>
        <div class="col-md-3">
          <label class="form-label">Date</label>
          <input type="date" class="form-control" formControlName="date" />
        </div>
        <div class="col-md-3">
          <label class="form-label">Seats needed</label>
          <input
            type="number"
            min="1"
            class="form-control"
            formControlName="seatsNeeded"
          />
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary">Search ride</button>
        </div>
      </form>
    </div>
  </div>

  <div class="row g-3" *ngIf="rides.length > 0; else noResult">
    <div class="col-md-6" *ngFor="let ride of rides">
      <div class="card h-100 shadow-sm">
        <div class="card-body d-flex flex-column gap-2">
          <h5 class="card-title mb-0">
            {{ ride.departure }} -> {{ ride.destination }}
          </h5>
          <small class="text-muted">{{
            ride.departureDateTime | date: "medium"
          }}</small>
          <div>
            <strong>Driver:</strong> {{ getDriverName(ride.ownerUserId) }}
          </div>
          <div><strong>Price:</strong> {{ ride.pricePerSeat }} TND</div>
          <div><strong>Seats available:</strong> {{ ride.seatsAvailable }}</div>
          <button
            class="btn btn-outline-primary mt-auto"
            (click)="viewDetails(ride.id)"
          >
            View details
          </button>
        </div>
      </div>
    </div>
  </div>

  <ng-template #noResult>
    <div class="alert alert-info">No rides match the selected filters.</div>
  </ng-template>
</div>
