<div class="container py-4" *ngIf="trip; else notEditable">
  <h2 class="mb-4">Edit trip</h2>

  <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
  <div class="alert alert-success" *ngIf="success">{{ success }}</div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form [formGroup]="editForm" (ngSubmit)="save()" class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Departure point</label>
          <input class="form-control" formControlName="departure" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Destination</label>
          <input class="form-control" formControlName="destination" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Departure time</label>
          <input
            type="datetime-local"
            class="form-control"
            formControlName="departureDateTime"
          />
        </div>
        <div class="col-md-3">
          <label class="form-label">Price</label>
          <input
            type="number"
            min="0"
            class="form-control"
            formControlName="pricePerSeat"
          />
        </div>
        <div class="col-md-3">
          <label class="form-label">Number of seats</label>
          <input
            type="number"
            min="1"
            class="form-control"
            formControlName="seatsTotal"
          />
        </div>
        <div class="col-12 d-flex gap-2">
          <button type="submit" class="btn btn-primary">Save changes</button>
          <button
            type="button"
            class="btn btn-outline-secondary"
            (click)="goToDetails()"
          >
            Back to details
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<ng-template #notEditable>
  <div class="container py-4">
    <div class="alert alert-warning">
      {{ error || "Trip is not editable." }}
    </div>
    <a class="btn btn-outline-primary" routerLink="/carpooling/my-trips"
      >Back to my trips</a
    >
  </div>
</ng-template>
