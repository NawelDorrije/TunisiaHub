  <div class="card shadow-sm mb-4">
    <div class="card-header fw-semibold">Search for a ride</div>
    <div class="card-body">
      <form [formGroup]="searchForm" (ngSubmit)="searchRide()" class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Departure point</label>
          <input
            class="form-control"
            formControlName="departure"
            placeholder="Tunis"
          />
        </div>
        <div class="col-md-3">
          <label class="form-label">Destination</label>
          <input
            class="form-control"
            formControlName="destination"
            placeholder="Sfax"
          />
        </div>
        <div class="col-md-3">
          <label class="form-label">Date</label>
          <input type="date" class="form-control" formControlName="date" />
        </div>
        <div class="col-md-3">
          <label class="form-label">Seats</label>
          <input
            type="number"
            min="1"
            class="form-control"
            formControlName="seatsNeeded"
          />
        </div>
        <div class="col-12 d-flex gap-2">
          <button type="submit" class="btn btn-primary">Search ride</button>
          <button type="button" class="btn btn-success" (click)="publishRide()">
            Publish ride
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-md-6">
      <div class="card h-100 shadow-sm">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">My Trips</h5>
          <p class="card-text">Manage rides you published as a driver.</p>
          <a
            class="btn btn-outline-primary mt-auto"
            routerLink="/carpooling/my-trips"
            >Open</a
          >
        </div>
      </div>
    </div>
