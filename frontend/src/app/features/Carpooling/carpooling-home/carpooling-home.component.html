<div class="container py-4">
  <h2 class="mb-4">Carpooling</h2>

  <div class="card shadow-sm mb-4">
    <div class="card-header fw-semibold">Search for a ride</div>
    <div class="card-body">
      <form [formGroup]="searchForm" (ngSubmit)="searchRide()" class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Departure point</label>
          <input
            type="text"
            class="form-control"
            formControlName="departure"
            placeholder="Tunis"
          />
        </div>

        <div class="col-md-3">
          <label class="form-label">Destination</label>
          <input
            type="text"
            class="form-control"
            formControlName="destination"
            placeholder="Sfax"
          />
        </div>

        <div class="col-md-2">
          <label class="form-label">Departure date</label>
          <input type="date" class="form-control" formControlName="date" />
          <div class="text-danger" *ngIf="f['date'].touched && f['date'].invalid">
            Date is required
          </div>
        </div>

        <div class="col-md-2">
          <label class="form-label">Return date</label>
          <input type="date" class="form-control" formControlName="returnDate" />
        </div>

        <div class="col-md-2">
          <label class="form-label">Seats needed</label>
          <input
            type="number"
            min="1"
            max="8"
            class="form-control"
            formControlName="seatsNeeded"
          />
          <div
            class="text-danger"
            *ngIf="f['seatsNeeded'].touched && f['seatsNeeded'].invalid"
          >
            Seats must be between 1 and 8
          </div>
        </div>

        <div class="col-12 d-flex gap-2">
          <button type="submit" class="btn btn-primary" [disabled]="searchForm.invalid">
            Search ride
          </button>
          <button type="button" class="btn btn-success" (click)="publishRide()">
            Publish ride
          </button>
          <a class="btn btn-outline-secondary" routerLink="/carpooling/admin">
            Admin area
          </a>
        </div>
      </form>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">My Trips</h5>
          <p class="card-text">Manage rides you published as a driver.</p>
          <a class="btn btn-outline-primary" routerLink="/carpooling/my-trips">
            Open
          </a>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">My Bookings</h5>
          <p class="card-text">Track your reservations as a passenger.</p>
          <a class="btn btn-outline-primary" routerLink="/carpooling/my-bookings">
            Open
          </a>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">My Vehicles</h5>
          <p class="card-text">Manage your vehicles and their history.</p>
          <a class="btn btn-outline-primary" routerLink="/carpooling/vehicles">
            Manage
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
