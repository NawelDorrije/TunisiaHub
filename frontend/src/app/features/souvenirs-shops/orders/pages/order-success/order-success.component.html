<div class="container py-4">
  <div class="card shadow-sm p-4">
    <div class="mb-4">
      <h2 class="mb-2">✅ Order placed successfully!</h2>
      <p class="text-muted mb-0">Your orders have been created successfully.</p>
    </div>

    <div *ngIf="isLoading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-3 mb-0">Loading order summary...</p>
    </div>

    <div *ngIf="!isLoading && fallbackMessage" class="alert alert-info">
      {{ fallbackMessage }}
    </div>

    <div *ngIf="!isLoading && createdOrders.length > 0" class="mb-4">
      <h5 class="mb-3">Your orders have been created:</h5>
      <div class="list-group">
        <div class="list-group-item d-flex justify-content-between align-items-center" *ngFor="let order of createdOrders">
          <div>
            <div class="fw-semibold">Order #{{ order.id }} — {{ order.shop?.name || 'Shop' }}</div>
            <div class="text-muted small">{{ order.status }}</div>
          </div>
          <div class="text-end">
            <span class="fw-semibold">{{ order.totalAmount | currency:'TND' }}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex flex-column flex-sm-row gap-2 mt-4">
      <button class="btn btn-primary flex-fill" (click)="viewMyOrders()">View My Orders</button>
      <button class="btn btn-outline-secondary flex-fill" (click)="continueShopping()">Continue Shopping</button>
    </div>
  </div>
</div>
