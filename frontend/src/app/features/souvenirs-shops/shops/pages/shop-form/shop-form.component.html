<div class="container py-4">
  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-3 mb-0">Loading shop...</p>
  </div>

  <div *ngIf="!isLoading" class="card shadow-sm p-4">
    <h2 class="mb-4">{{ isEditMode ? 'Edit Shop' : 'Create New Shop' }}</h2>

    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <form #shopForm="ngForm" (ngSubmit)="save(shopForm)">
      <div class="mb-3">
        <label for="name" class="form-label">Shop name</label>
        <input
          id="name"
          name="name"
          [(ngModel)]="shop.name"
          required
          class="form-control"
          placeholder="Enter shop name"
        />
      </div>

      <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea
          id="description"
          name="description"
          [(ngModel)]="shop.description"
          required
          rows="5"
          class="form-control"
          placeholder="Describe the shop"
        ></textarea>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label for="category" class="form-label">Category</label>
          <select
            id="category"
            name="category"
            [(ngModel)]="shop.category"
            required
            class="form-select"
          >
            <option [ngValue]="undefined">Choose category</option>
            <option value="SOUVENIRS">Souvenirs</option>
            <option value="CLOTHING">Clothing</option>
            <option value="JEWELRY">Jewelry</option>
            <option value="LEATHER">Leather</option>
            <option value="HOMELIVING">Home & Living</option>
            <option value="ART">Art</option>
          </select>
        </div>
        <div class="col-md-6">
          <label for="city" class="form-label">City</label>
          <input
            id="city"
            name="city"
            [(ngModel)]="shop.city"
            required
            class="form-control"
            placeholder="City"
          />
        </div>
      </div>

      <div class="mb-3">
        <label for="address" class="form-label">Location (text)</label>
        <input
          id="address"
          name="address"
          [(ngModel)]="shop.address"
          required
          class="form-control"
          placeholder="Tunis Medina, Rue des Teinturiers"
        />
      </div>

      <div class="mb-4">
        <label class="form-label">📍 Click on the map to set your shop location</label>
        <div #mapContainer class="map-container mb-3"></div>
        <div *ngIf="isReverseGeocoding" class="form-text mb-2">
          Looking up city and address from the selected location...
        </div>

        <div *ngIf="photoUrl" class="mb-3 text-center">
          <label class="form-label d-block">Current image</label>
          <img [src]="photoUrl" class="img-fluid rounded mb-2" width="180" alt="Shop image preview" />
        </div>

        <div class="mb-3">
          <label for="shopImage" class="form-label">Shop image</label>
          <input
            id="shopImage"
            type="file"
            accept="image/*"
            (change)="onFileSelected($event)"
            class="form-control"
          />
          <button
            type="button"
            class="btn btn-outline-primary mt-2"
            (click)="uploadShopImage()"
            [disabled]="!selectedFile || isUploadingImage"
          >
            {{ isUploadingImage ? 'Uploading...' : 'Upload image' }}
          </button>
          <div *ngIf="uploadError" class="form-text text-danger">{{ uploadError }}</div>
        </div>

        <div class="mb-3">
          <label for="photoUrl" class="form-label">Photo URL</label>
          <input
            id="photoUrl"
            name="photoUrl"
            [(ngModel)]="shop.photoUrl"
            readonly
            class="form-control"
            placeholder="Uploaded image URL"
          />
        </div>

        <div class="row g-3">
          <div class="col-md-6">
            <label for="latitude" class="form-label">Latitude</label>
            <input
              id="latitude"
              name="latitude"
              type="number"
              step="any"
              [(ngModel)]="shop.latitude"
              required
              readonly
              class="form-control"
              placeholder="Latitude auto-filled from map"
            />
          </div>
          <div class="col-md-6">
            <label for="longitude" class="form-label">Longitude</label>
            <input
              id="longitude"
              name="longitude"
              type="number"
              step="any"
              [(ngModel)]="shop.longitude"
              required
              readonly
              class="form-control"
              placeholder="Longitude auto-filled from map"
            />
          </div>
        </div>
      </div>

      <div class="mb-3">
        <label for="ownerId" class="form-label">Owner ID</label>
        <input
          id="ownerId"
          name="ownerId"
          type="number"
          [(ngModel)]="ownerId"
          required
          class="form-control"
          placeholder="Enter owner id"
        />
        <div *ngIf="shop.owner" class="form-text">
          Current owner: {{ shop.owner.prenom }} {{ shop.owner.nom }}
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary" [disabled]="shopForm.invalid">
          {{ isEditMode ? 'Save changes' : 'Create shop' }}
        </button>
        <button type="button" class="btn btn-outline-secondary" (click)="cancel()">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
