<section class="carpooling-shell">
  <header class="shell-head">
    <h1>Carpooling</h1>
    <p>Find and publish rides across Tunisia.</p>
  </header>

  <nav class="sub-nav" aria-label="Carpooling navigation">
    @for (tab of tabs; track tab.path) {
      <a [routerLink]="tab.path" routerLinkActive="active">{{ tab.label }}</a>
    }
  </nav>

  <div class="shell-body">
    <router-outlet />
  </div>
</section>
