<section class="admin-dashboard-wrapper">
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
    <div>
      <h3 class="mb-1 fw-bold">Admin Dashboard</h3>
      <p class="text-muted mb-0">Choose a service to manage platform operations.</p>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-12 col-sm-6 col-lg-4" *ngFor="let card of cards">
      <div class="card h-100 border-0 shadow-sm admin-service-card">
        <div class="card-body d-flex flex-column">
          <div class="service-icon mb-3">
            <i [class]="card.icon"></i>
          </div>

          <h5 class="fw-bold mb-2">{{ card.title }}</h5>
          <p class="text-muted mb-4 flex-grow-1">{{ card.description }}</p>

          <a class="btn btn-primary mt-auto" [routerLink]="card.route">
            {{ card.cta }}
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
