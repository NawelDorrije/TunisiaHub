<div class="card shadow-sm border-0 mb-4">
  <div class="card-body">

    <h5 class="card-title mb-3">
      {{ isEditMode ? 'Edit your review' : 'Write a review' }}
    </h5>

    <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>
    <div class="alert alert-success" *ngIf="successMessage">{{ successMessage }}</div>

    <form [formGroup]="reviewForm" (ngSubmit)="onSubmit()" class="row g-3">

      <!-- Rating -->
      <div class="col-md-12">
        <label class="form-label">Rating</label>
        <div class="d-flex gap-2 align-items-center">
          <ng-container *ngFor="let star of [1, 2, 3, 4, 5]">
            <i
              class="bi fs-3"
              [class.bi-star-fill]="(f['rating'].value ?? 0) >= star"
              [class.bi-star]="(f['rating'].value ?? 0) < star"
              [class.text-warning]="(f['rating'].value ?? 0) >= star"
              [class.text-muted]="(f['rating'].value ?? 0) < star"
              style="cursor: pointer;"
              (click)="f['rating'].setValue(star)"
            ></i>
          </ng-container>
          <small class="text-muted ms-2">
            {{ f['rating'].value ? f['rating'].value + ' / 5' : 'Select a rating' }}
          </small>
        </div>
        <div class="text-danger small mt-1"
          *ngIf="f['rating'].invalid && f['rating'].touched">
          Please select a rating.
        </div>
      </div>

      <!-- Comment -->
      <div class="col-md-12">
        <label class="form-label">Comment</label>
        <textarea
          class="form-control"
          rows="3"
          formControlName="comment"
          [class.is-invalid]="f['comment'].invalid && f['comment'].touched"
          placeholder="Share your experience..."
        ></textarea>
        <div class="invalid-feedback">
          Comment is required and must be at least 5 characters.
        </div>
      </div>

      <!-- Buttons -->
      <div class="col-12 d-flex gap-2">
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="isLoading"
        >
          <span
            *ngIf="isLoading"
            class="spinner-border spinner-border-sm me-2"
            role="status"
          ></span>
          {{ isLoading ? 'Saving...' : isEditMode ? 'Save Changes' : 'Submit Review' }}
        </button>
        <button
          *ngIf="isEditMode"
          type="button"
          class="btn btn-outline-secondary"
          (click)="onCancel()"
        >
          Cancel
        </button>
      </div>

    </form>
  </div>
</div>
