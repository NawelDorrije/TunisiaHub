<div class="mt-4" *ngIf="latitude && longitude">
  <hr />
  <div class="row g-4">

    <!-- Map -->
    <div class="col-md-6">
      <h5 class="fw-bold mb-3">📍 Location</h5>
      <div class="card border-0 shadow-sm">
        <div
          id="map-display"
          style="height: 300px; width: 100%; border-radius: 12px; z-index: 0;"
        ></div>
        <div class="card-body py-2 text-center">
          <button
            class="btn btn-outline-primary btn-sm"
            (click)="openInMaps()"
          >
            🗺️ Open in OpenStreetMap
          </button>
        </div>
      </div>
    </div>

    <!-- Weather -->
    <div class="col-md-6">
      <h5 class="fw-bold mb-3">🌤️ 5-Day Forecast</h5>

      <!-- Loading -->
      <div class="text-center py-4" *ngIf="isLoadingWeather">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <!-- Error -->
      <div class="alert alert-danger" *ngIf="weatherError">
        {{ weatherError }}
      </div>

      <!-- Forecast cards -->
      <div class="d-flex flex-column gap-2" *ngIf="!isLoadingWeather && !weatherError">
        <div
          class="card border-0 shadow-sm"
          *ngFor="let day of forecast"
        >
          <div class="card-body py-2 px-3 d-flex justify-content-between align-items-center">

            <!-- Day + condition -->
            <div class="d-flex align-items-center gap-2">
              <span style="font-size: 1.8rem;">{{ getWeatherEmoji(day.weatherCode) }}</span>
              <div>
                <p class="fw-semibold mb-0">{{ getDayName(day.date) }}</p>
                <small class="text-muted">{{ getWeatherLabel(day.weatherCode) }}</small>
              </div>
            </div>

            <!-- Temps -->
            <div class="text-end">
              <span class="fw-bold text-danger">{{ day.maxTemp }}°C</span>
              <span class="text-muted mx-1">/</span>
              <span class="text-primary">{{ day.minTemp }}°C</span>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- No location set -->
<div class="alert alert-info mt-4" *ngIf="!latitude || !longitude">
  📍 No location set for this accommodation.
</div>
