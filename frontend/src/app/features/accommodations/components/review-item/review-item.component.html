<div class="card border-0 shadow-sm mb-3">
  <div class="card-body">

    <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>

    <!-- Header: user + date -->
    <div class="d-flex justify-content-between align-items-start mb-2">
      <div>
        <p class="fw-bold mb-0">
          {{ review.user ? review.user.nom + ' ' + review.user.prenom : 'Anonymous' }}
        </p>
        <small class="text-muted">{{ review.reviewDate }}</small>
      </div>

      <!-- Actions — only for owner -->
      <div class="d-flex gap-2" *ngIf="isOwner">
        <button
          class="btn btn-outline-secondary btn-sm"
          (click)="onEdit()"
        >
          Edit
        </button>
        <button
          class="btn btn-outline-danger btn-sm"
          (click)="onDelete()"
        >
          Delete
        </button>
      </div>
    </div>

    <!-- Stars -->
    <div class="mb-2">
      <i *ngFor="let star of stars" class="bi bi-star-fill text-warning"></i>
      <i *ngFor="let star of emptyStars" class="bi bi-star text-muted"></i>
    </div>

    <!-- Comment -->
    <p class="text-secondary mb-0">{{ review.comment }}</p>

  </div>
</div>
