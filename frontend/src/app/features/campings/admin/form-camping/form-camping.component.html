<div class="container-fluid py-4" style="background-color: #F8F9FA; min-height: 100vh;">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-9 col-xl-7">

      <!-- Header -->
      <div class="text-center mb-4">
        <i class="bi bi-tent-fill display-5 text-primary mb-3"></i>
        <h1 class="h3 fw-bold text-dark mb-1">
          {{ isEditMode ? 'Edit Camping' : 'New Camping' }}
        </h1>
        <p class="text-muted small">Fill in the information below</p>
      </div>

      <div class="card border-0 shadow-sm" style="border-radius: 20px;">
        <div class="card-body p-4">

          <form [formGroup]="campingForm" (ngSubmit)="onSubmit()">

            <div class="row g-3">

              <!-- Name -->
              <div class="col-12">
                <label class="form-label small fw-medium">Camping Name</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-house-door fs-5"></i></span>
                  <input type="text"
                         class="form-control"
                         formControlName="name"
                         placeholder="Ex: Desert Oasis">
                </div>
                <div class="text-danger mt-1 small"
                     *ngIf="campingForm.get('name')?.touched && campingForm.get('name')?.invalid">
                  <div *ngIf="campingForm.get('name')?.hasError('required')">Name is required</div>
                  <div *ngIf="campingForm.get('name')?.hasError('minlength')">Minimum 3 characters</div>
                </div>
              </div>

              <!-- Price -->
              <div class="col-md-6">
                <label class="form-label small fw-medium">Price per night (TND)</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-currency-dollar fs-5"></i></span>
                  <input type="number"
                         class="form-control"
                         formControlName="price"
                         placeholder="120">
                </div>
                <div class="text-danger mt-1 small"
                     *ngIf="campingForm.get('price')?.touched && campingForm.get('price')?.invalid">
                  <div *ngIf="campingForm.get('price')?.hasError('required')">Price is required</div>
                  <div *ngIf="campingForm.get('price')?.hasError('min')">Price must be greater than 0</div>
                </div>
              </div>

              <!-- Location -->
              <div class="col-md-6">
                <label class="form-label small fw-medium">Location</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-geo-alt fs-5"></i></span>
                  <input type="text"
                         class="form-control"
                         formControlName="location"
                         placeholder="Ex: Tozeur, Tunisia">
                </div>
              </div>

              <!-- Camping Type -->
              <div class="col-md-6">
                <label class="form-label small fw-medium">Camping Type</label>
                <select class="form-select" formControlName="campingType">
                  <option value="">Choose a type</option>
                  <option *ngFor="let type of campingTypes" [value]="type">{{ type }}</option>
                </select>
              </div>

              <!-- Dates -->
              <div class="col-md-6">
                <label class="form-label small fw-medium">Availability Dates</label>
                <div class="row g-2">
                  <div class="col-6">
                    <div class="input-group">
                      <span class="input-group-text"><i class="bi bi-calendar fs-5"></i></span>
                      <input type="date" class="form-control" formControlName="startDate">
                    </div>
                  </div>
                  <div class="col-6">
                    <div class="input-group">
                      <span class="input-group-text"><i class="bi bi-calendar fs-5"></i></span>
                      <input type="date" class="form-control" formControlName="endDate">
                    </div>
                  </div>
                </div>
                <div class="text-danger mt-1 small"
                     *ngIf="campingForm.errors?.['endDateBeforeStart'] ||
                            (campingForm.get('endDate')?.touched && campingForm.get('endDate')?.invalid)">
                  End date must be after start date
                </div>
              </div>

              <!-- Description -->
              <div class="col-12">
                <label class="form-label small fw-medium">Description</label>
                <textarea class="form-control"
                          rows="4"
                          formControlName="description"
                          placeholder="Describe your camping..."></textarea>
                <div class="text-danger mt-1 small"
                     *ngIf="campingForm.get('description')?.touched && campingForm.get('description')?.invalid">
                  <div *ngIf="campingForm.get('description')?.hasError('required')">Description is required</div>
                  <div *ngIf="campingForm.get('description')?.hasError('minlength')">Minimum 10 characters</div>
                </div>
              </div>

              <!-- Photos -->
              <div class="col-12">
                <label class="form-label small fw-medium">Camping Photos</label>
                <input type="file"
                       class="form-control"
                       multiple
                       accept="image/*"
                       (change)="onFilesSelected($event)">

                <small class="text-muted mt-2 d-block">
                  {{ photosPreview.length }} image(s) selected
                </small>

                <div class="d-flex flex-wrap gap-2 mt-3" *ngIf="photosPreview.length > 0">
                  <div *ngFor="let img of photosPreview; let i = index"
                       class="position-relative rounded-3 overflow-hidden"
                       style="width: 100px; height: 80px;">
                    <img [src]="img" class="w-100 h-100 object-fit-cover" alt="preview">
                    <button type="button"
                            class="btn btn-sm btn-danger position-absolute top-0 end-0 m-1 p-0"
                            style="width: 24px; height: 24px;"
                            (click)="removeImage(i)">
                      <i class="bi bi-x"></i>
                    </button>
                  </div>
                </div>
              </div>

            </div>

            <!-- Submit Button -->
            <div class="d-grid mt-4">
              <button type="submit"
                      class="btn btn-primary py-2.5 fw-medium"
                      [disabled]="campingForm.invalid">
                <i class="bi bi-check2 me-2"></i>
                {{ isEditMode ? 'Update' : 'Create Camping' }}
              </button>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>
