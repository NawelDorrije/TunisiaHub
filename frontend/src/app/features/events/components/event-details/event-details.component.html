<div class="container mt-4">

  <div class="card shadow-lg">

    <!-- IMAGE -->
    <img *ngIf="event?.image"
         [src]="event.image"
         class="card-img-top"
         style="height: 300px; object-fit: cover;">

    <div class="card-body">

      <!-- TITLE -->
      <h2 class="text-primary">{{ event?.title }}</h2>

      <!-- TYPE + STATUS -->
      <div class="mb-3">
        <span class="badge bg-info me-2">{{ event?.type }}</span>
        <span class="badge bg-success">{{ event?.status }}</span>
      </div>

      <!-- DESCRIPTION -->
      <p class="text-muted">
        {{ event?.description }}
      </p>

      <!-- INFO GRID -->
      <div class="row mt-3">

        <div class="col-md-4">
          <p><b>💰 Price:</b> {{ event?.price }} TND</p>
        </div>

        <div class="col-md-4">
          <p><b>👥 Capacity:</b> {{ event?.capacity }}</p>
        </div>

        <div class="col-md-4">
          <p><b>📍 Location:</b> {{ event?.lieu }}</p>
        </div>

        <div class="col-md-6">
          <p><b>📅 Start:</b> {{ event?.startDate | date:'medium' }}</p>
        </div>

        <div class="col-md-6">
          <p><b>⏳ End:</b> {{ event?.endDate | date:'medium' }}</p>
        </div>

      </div>

      <!-- MAP -->
      <div class="mt-4">
        <h5>📍 Event Location</h5>
        <div id="map" style="height: 400px; border-radius: 10px;"></div>
      </div>

    </div>

  </div>

</div>
