<div class="page">

  <div class="reservation-card">

    <!-- LEFT: EVENT INFO -->
    <div class="event-side">

      <div class="event-header">
        <div>
          <h2>{{ event?.title }}</h2>
          <p class="location">📍 {{ event?.lieu }}</p>
        </div>

        <div class="price-tag">
          {{ event?.price }} <span>TND</span>
        </div>
      </div>

      <img *ngIf="event?.image"
           [src]="event.image"
           class="event-img"/>

      <div class="event-info">
        <div class="info-item">👥 {{ event?.capacity }} seats</div>
        <div class="info-item">📅 {{ event?.startDate | date:'mediumDate' }}</div>
        <div class="info-item">⏳ {{ event?.endDate | date:'mediumDate' }}</div>
      </div>

    </div>

    <!-- RIGHT: FORM -->
    <div class="form-side">

      <h3 class="title">Complete your reservation</h3>

      <div *ngIf="errorMessage" class="error">
        {{ errorMessage }}
      </div>

      <form [formGroup]="reservationForm" (ngSubmit)="pay()">

        <!-- NAME -->
        <div class="grid">

          <div class="input-group">
            <input type="text" placeholder="First Name" formControlName="firstName">
            <small *ngIf="f.firstName.touched && f.firstName.invalid">
              Min 3 characters
            </small>
          </div>

          <div class="input-group">
            <input type="text" placeholder="Last Name" formControlName="lastName">
            <small *ngIf="f.lastName.touched && f.lastName.invalid">
              Min 3 characters
            </small>
          </div>

        </div>

        <!-- EMAIL -->
        <div class="input-group">
          <input type="email" placeholder="Email" formControlName="email">
          <small *ngIf="f.email.touched && f.email.invalid">
            Invalid email
          </small>
        </div>

        

        <!-- BUTTON -->
        <button class="btn" type="submit" [disabled]="isLoading">
          {{ isLoading ? 'Processing...' : ('Pay ' + event?.price + ' TND') }}
        </button>

      </form>

    </div>

  </div>

  <!-- STRIPE MODAL -->
  <app-stripe-payment
    *ngIf="showStripe"
    [reservationId]="reservationId"
    [amount]="event?.price"
    (close)="closeStripe()">
  </app-stripe-payment>

</div>
