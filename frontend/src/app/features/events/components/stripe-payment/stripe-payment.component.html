<div class="popup" *ngIf="show">

  <div class="popup-overlay" (click)="close()"></div>

  <div class="popup-content">

    <!-- HEADER -->
    <div class="header">
      <div class="lock">🔒 Secure Payment</div>
      <p class="subtitle">Encrypted checkout powered by Stripe</p>
    </div>

    <!-- AMOUNT -->
    <div class="amount-card">
      <span>Total</span>
      <div class="amount">{{ amount }} <small>TND</small></div>
    </div>

    <!-- FORM -->
    <div class="form">

      <!-- CARD NUMBER -->
      <label>Card number</label>
      <div class="stripe-input" id="card-number"></div>

      <!-- EXPIRY + CVC -->
      <div class="row">

        <div class="col">
          <label>Expiry</label>
          <div class="stripe-input" id="card-expiry"></div>
        </div>

        <div class="col">
          <label>CVC</label>
          <div class="stripe-input" id="card-cvc"></div>
        </div>

      </div>

      <!-- POSTAL -->
      <label>Postal code</label>
      <input type="text"
             placeholder="1234"
             [(ngModel)]="postalCode">

    </div>

    <!-- ERROR -->
    <div class="error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <!-- BUTTONS -->
    <button class="pay-btn" (click)="pay()" [disabled]="loading">
      {{ loading ? 'Processing...' : 'Pay ' + amount + ' TND' }}
    </button>

    <button class="cancel-btn" (click)="close()">
      Cancel
    </button>

  </div>

</div>
