<div class="layout">
  <header class="shell-header">
    <div class="logo">
      <span class="accent-dot"></span>
      <div>
        <p class="brand">DiscoveryTunisia</p>
        <p class="tagline">Experience orchestration workspace</p>
      </div>
    </div>
    <nav>
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: link.path === '' }"
        >
          {{ link.label }}
        </a>
      }
    </nav>
  </header>

  <main class="shell-content">
    <router-outlet />
  </main>

  <footer class="shell-footer">
    <small>Frontend scaffold • Angular 17 • SCSS • ESLint • Prettier</small>
  </footer>
</div>
