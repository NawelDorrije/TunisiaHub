<div class="layout">
  <header class="shell-header">
    <div class="header-main">
      <div>
        <div class="logo">
          <span class="accent-dot"></span>
          <p class="brand">DiscoveryTunisia</p>
        </div>
        <p class="tagline">Shared experience platform for all modules</p>
      </div>

      <div class="session-controls">
        <label>
          User ID
          <input
            type="number"
            min="1"
            [ngModel]="userId"
            (ngModelChange)="onUserIdChange($event)"
          />
        </label>

        <label>
          Role
          <select [ngModel]="role" (ngModelChange)="onRoleChange($event)">
            @for (roleOption of roleOptions; track roleOption) {
              <option [value]="roleOption">{{ roleOption }}</option>
            }
          </select>
        </label>
      </div>
    </div>

    <nav class="shell-nav" aria-label="Main navigation">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: link.exact }"
        >
          {{ link.label }}
        </a>
      }
    </nav>
  </header>

  <main class="shell-content">
    <router-outlet />
  </main>

  <footer class="shell-footer">
    <div class="footer-top">
      <p class="footer-brand">DiscoveryTunisia</p>
      <nav class="footer-nav" aria-label="Footer quick links">
        @for (link of footerLinks; track link.path) {
          <a [routerLink]="link.path">{{ link.label }}</a>
        }
      </nav>
    </div>
    <small>© {{ currentYear }} DiscoveryTunisia • Shared shell for all modules</small>
  </footer>
</div>
